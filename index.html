<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Drug Information Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Drug Information Chatbot</h1>
    <p>
      SOP MITVPU | Designed by Rashmit, Nuzzat, Nipun <br>
      Mentored by Dr. Shradha Tiwari
    </p>
  </header>

  <!-- Search Section -->
  <section class="search-section">
    <input type="text" id="drugInput" placeholder="Search Drug Name..." />
    <button onclick="searchDrug()">Search</button>
  </section>

  <!-- Result Section -->
  <section id="result" class="result-container">

    <div class="card">
      <h2>Drug Name</h2>
      <p id="drugName">-</p>
    </div>

    <div class="card">
      <h2>Dosage</h2>
      <p id="drugDosage">-</p>
    </div>

    <div class="card">
      <h2>Uses</h2>
      <p id="drugUses">-</p>
    </div>

    <div class="card">
      <h2>Side Effects</h2>
      <p id="drugEffects">-</p>
    </div>

  </section>

  <script src="script.js"></script>
</body>
</html>
